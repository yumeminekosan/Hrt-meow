<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FJÖRÐUR — Pharmacokinetic Simulation Engine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0a0e17;
  --surface:#111827;
  --surface2:#1a2332;
  --border:#1e293b;
  --text:#c8d6e5;
  --text-dim:#64748b;
  --aurora1:#22d3ee;
  --aurora2:#818cf8;
  --aurora3:#34d399;
  --lava:#f97316;
  --ice:#e0f2fe;
  --glacier:#38bdf8;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* Aurora header */
.aurora{
  position:relative;
  height:220px;
  overflow:hidden;
  background:linear-gradient(135deg,#0a0e17 0%,#0f172a 40%,#0a0e17 100%);
}
.aurora::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 600px 120px at 30% 40%, rgba(34,211,238,0.15), transparent),
    radial-gradient(ellipse 500px 100px at 60% 50%, rgba(129,140,248,0.12), transparent),
    radial-gradient(ellipse 700px 80px at 70% 30%, rgba(52,211,153,0.10), transparent);
  animation:aurora-shift 12s ease-in-out infinite alternate;
}
@keyframes aurora-shift{
  0%{transform:translateX(-30px) scaleX(1)}
  50%{transform:translateX(20px) scaleX(1.1)}
  100%{transform:translateX(-10px) scaleX(0.95)}
}
.aurora-title{
  position:absolute;bottom:30px;left:40px;
  font-family:'Space Mono',monospace;
  font-size:2.4rem;font-weight:700;
  letter-spacing:0.3em;
  background:linear-gradient(135deg,var(--aurora1),var(--aurora2),var(--aurora3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.aurora-sub{
  position:absolute;bottom:8px;left:42px;
  font-size:0.75rem;letter-spacing:0.5em;color:var(--text-dim);
  text-transform:uppercase;
}

/* Stars */
.stars{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:0.3;animation:twinkle 3s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:0.1}100%{opacity:0.6}}

/* Layout */
.container{max-width:1100px;margin:0 auto;padding:20px 30px}

/* Panels */
.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:24px;
  margin-bottom:20px;
}
.panel-title{
  font-family:'Space Mono',monospace;
  font-size:0.85rem;
  letter-spacing:0.15em;
  color:var(--aurora1);
  margin-bottom:16px;
  text-transform:uppercase;
}

/* Grid */
.grid{display:grid;gap:20px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:768px){
  .grid-2,.grid-3{grid-template-columns:1fr}
  .aurora-title{font-size:1.4rem;left:20px}
  .aurora-sub{left:22px}
  .container{padding:12px 16px}
}

/* Controls */
.control-group{margin-bottom:14px}
.control-label{
  font-size:0.7rem;
  letter-spacing:0.1em;
  color:var(--text-dim);
  text-transform:uppercase;
  margin-bottom:4px;
}
input[type="range"]{
  -webkit-appearance:none;width:100%;height:4px;
  background:var(--border);border-radius:2px;outline:none;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  background:var(--aurora1);border-radius:50%;cursor:pointer;
  box-shadow:0 0 8px rgba(34,211,238,0.4);
}
.value-badge{
  display:inline-block;
  font-family:'Space Mono',monospace;
  font-size:0.75rem;
  color:var(--aurora2);
  background:var(--surface2);
  padding:2px 8px;
  border-radius:4px;
  margin-top:2px;
}

/* Buttons */
.btn{
  font-family:'Space Mono',monospace;
  font-size:0.75rem;
  letter-spacing:0.1em;
  padding:10px 24px;
  border:1px solid var(--aurora1);
  background:transparent;
  color:var(--aurora1);
  border-radius:6px;
  cursor:pointer;
  transition:all 0.2s;
  text-transform:uppercase;
}
.btn:hover{
  background:rgba(34,211,238,0.1);
  box-shadow:0 0 20px rgba(34,211,238,0.15);
}
.btn-lava{
  border-color:var(--lava);color:var(--lava);
}
.btn-lava:hover{
  background:rgba(249,115,22,0.1);
  box-shadow:0 0 20px rgba(249,115,22,0.15);
}

/* Chart */
canvas{
  width:100%;height:320px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
}

/* Stats */
.stat{
  text-align:center;padding:8px 4px;
}
.stat-value{
  font-family:'Space Mono',monospace;
  font-size:1.4rem;font-weight:700;
  background:linear-gradient(135deg,var(--aurora1),var(--aurora2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.stat-label{
  font-size:0.65rem;letter-spacing:0.15em;
  color:var(--text-dim);text-transform:uppercase;margin-top:2px;
}

/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:16px}
.tab{
  font-family:'Space Mono',monospace;
  font-size:0.7rem;letter-spacing:0.1em;
  padding:8px 16px;
  background:var(--surface2);
  color:var(--text-dim);
  border:none;cursor:pointer;
  transition:all 0.2s;
  text-transform:uppercase;
}
.tab:first-child{border-radius:6px 0 0 6px}
.tab:last-child{border-radius:0 6px 6px 0}
.tab.active{
  background:var(--aurora1);color:var(--bg);
}

/* Icons */
.icon{display:inline-block;vertical-align:middle;width:16px;height:16px;margin-right:8px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.icon-fill{fill:currentColor;stroke:none}
.icon-sm{width:12px;height:12px;margin-right:6px}

/* Legend */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}
.legend-item{
  display:flex;align-items:center;gap:6px;
  font-size:0.7rem;color:var(--text-dim);
}
.legend-dot{
  width:10px;height:10px;border-radius:50%;
}

/* Select */
select{
  font-family:'Inter',sans-serif;
  font-size:0.8rem;
  padding:6px 12px;
  background:var(--surface2);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:6px;
  cursor:pointer;
}

/* Footer */
.footer{
  text-align:center;
  padding:30px;
  font-size:0.65rem;
  color:var(--text-dim);
  letter-spacing:0.2em;
}
</style>
</head>
<body>

<!-- Aurora Header -->
<div class="aurora">
  <div class="stars" id="stars"></div>
  <div class="aurora-title">FJÖRÐUR</div>
  <div class="aurora-sub">Pharmacokinetic Simulation Engine</div>
</div>

<div class="container">

<!-- Simulation Mode Tabs -->
<div class="tabs">

  <button class="tab" onclick="setMode('im')">Intramuscular</button>
  <button class="tab" onclick="setMode('ddi')">DDI</button>
  <button class="tab" onclick="setMode('calibration')">CALIBRATION</button>
</div>

<!-- Controls + Chart Row -->
<div class="grid grid-2" id="mainGrid">

<!-- Left: Controls -->
<div id="leftPanel">
  <div class="panel" id="paramPanel">
    <div class="panel-title"><svg class="icon" viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><circle cx="9" cy="6" r="2.5" fill="var(--aurora1)" stroke="none"/><line x1="4" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="2.5" fill="var(--aurora2)" stroke="none"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="11" cy="18" r="2.5" fill="var(--aurora3)" stroke="none"/></svg> Parameters</div>
    <div id="controls"></div>
  </div>
  <div class="panel" id="calibrationPanel" style="display:none">
    <div class="panel-title"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Calibration</div>
    <div id="calibrationControls"></div>
    <div style="margin-top:12px">
      <button class="btn" onclick="runCalibration()" style="width:100%"><svg class="icon icon-sm" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21" fill="currentColor" stroke="none"/></svg> Run Calibration</button>
    </div>
    <div style="margin-top:12px">
      <button class="btn btn-lava" onclick="generateReport()" style="width:100%"><svg class="icon icon-sm" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" fill="none"/><path d="M8 12h8M8 16h5"/></svg> Generate Report</button>
    </div>
    <div id="calibrationResults" style="margin-top:16px"></div>
  </div>
  <div class="panel">
    <div class="panel-title"><svg class="icon" viewBox="0 0 24 24"><rect x="7" y="3" width="10" height="18" rx="5"/><line x1="7" y1="12" x2="17" y2="12"/></svg> Dosing</div>
    <div class="control-group">
      <div class="control-label">Dose (mg)</div>
      <input type="range" id="dose" min="0.5" max="20" step="0.5" value="2">
      <div class="value-badge" id="doseVal">2.0 mg</div>
    </div>
    <div class="control-group">
      <div class="control-label">Duration (days)</div>
      <input type="range" id="days" min="1" max="28" step="1" value="14">

    <div class="control-group">
      <div class="control-label">Frequency</div>

        <option value="24">Once daily</option>

      </select>
    </div>
  </div>
  <button class="btn" onclick="run()" style="width:100%"><svg class="icon icon-sm" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21" fill="currentColor" stroke="none"/></svg> Run Simulation</button>
</div>

<!-- Right: Chart -->
<div>
  <div class="panel">
    <div class="panel-title"><svg class="icon" viewBox="0 0 24 24"><polyline points="3,17 8,11 13,14 21,5"/><line x1="3" y1="21" x2="3" y2="3"/><line x1="3" y1="21" x2="21" y2="21"/></svg> Concentration–Time Curve <button class="btn" style="float:right;padding:4px 10px;font-size:0.6rem" onclick="toggleSmooth()" id="smoothBtn">SMOOTH</button></div>
    <canvas id="chart"></canvas>
    <div class="legend" id="legend"></div>
  </div>
</div>

</div>

<!-- Stats Row -->
<div class="grid" id="statsRow" style="grid-template-columns:repeat(2,1fr);gap:12px;margin-top:4px">
  <div class="stat"><div class="stat-value" id="statCmax">—</div><div class="stat-label">Cmax</div></div>
  <div class="stat"><div class="stat-value" id="statTmax">—</div><div class="stat-label">Tmax</div></div>
  <div class="stat"><div class="stat-value" id="statAUC">—</div><div class="stat-label">AUC</div></div>
  <div class="stat"><div class="stat-value" id="statHalf">—</div><div class="stat-label">t½</div></div>
</div>

<!-- Footer -->
<div class="footer">
  FJÖRÐUR PK ENGINE — BUILT WITH <svg class="icon icon-sm" viewBox="0 0 24 24" style="vertical-align:-2px"><line x1="12" y1="2" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/><line x1="19.07" y1="4.93" x2="4.93" y2="19.07"/><line x1="12" y1="2" x2="10" y2="5.5"/><line x1="12" y1="2" x2="14" y2="5.5"/><line x1="12" y1="22" x2="10" y2="18.5"/><line x1="12" y1="22" x2="14" y2="18.5"/><line x1="4.93" y1="4.93" x2="8" y2="6"/><line x1="4.93" y1="4.93" x2="6" y2="8"/><line x1="19.07" y1="19.07" x2="16" y2="18"/><line x1="19.07" y1="19.07" x2="18" y2="16"/><line x1="19.07" y1="4.93" x2="16" y2="6"/><line x1="19.07" y1="4.93" x2="18" y2="8"/><line x1="4.93" y1="19.07" x2="8" y2="18"/><line x1="4.93" y1="19.07" x2="6" y2="16"/></svg> AND <svg class="icon icon-sm" viewBox="0 0 24 24" style="vertical-align:-2px"><path d="M3 20h18" stroke-width="1.2"/><path d="M5 20L9 8l4 6 4-6 2 12" stroke-width="1.2"/><path d="M10 12c0-2 1-3 2-3s2 1 2 3" stroke-width="1.2"/></svg> — GITHUB PAGES DEMO
</div>

</div>

<script>
// ============================================================
// FJÖRÐUR — Browser PK Simulation Engine
// ============================================================

// --- Stars ---
const starsEl = document.getElementById('stars');
for(let i=0;i<40;i++){
  const s=document.createElement('div');s.className='star';
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.animationDelay=Math.random()*3+'s';
  starsEl.appendChild(s);
}

// --- Mode & Presets ---
let currentMode = 'oral';
const presets = {
  oral:  { CL:25, Vd:200, ka:1.5, F:0.05, label:'Oral Estradiol 2mg' },
  im:    { CL:0.05*300, Vd:300, ka:0.008, F:1.0, label:'IM Estradiol Valerate 10mg',
           ev:true, kh:10, keEV:0.5, VdEV:80, fConv:0.10, MW:0.8665, dose:10 },
  ddi:   { CL:25, Vd:200, ka:1.5, F:0.05, label:'E2 + CPA DDI',
           ddi:true, Ki:0.4494, cpCL:2.73, cpVd:340, cpka:2.0, cpF:0.88, cpDose:50 }
};

function setMode(m){
  currentMode=m;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['oral','im','ddi','calibration'][i]===m);
  });

  // Show/hide panels based on mode
  const paramPanel=document.getElementById('paramPanel');
  const calibrationPanel=document.getElementById('calibrationPanel');
  const dosingPanel=document.querySelector('#leftPanel .panel:nth-child(2)');
  const runBtn=document.querySelector('#leftPanel button[onclick="run()"]');

  if(m==='calibration'){
    paramPanel.style.display='none';
    dosingPanel.style.display='none';
    if(runBtn) runBtn.style.display='none';
    calibrationPanel.style.display='block';
    buildCalibrationControls();
  } else {
    paramPanel.style.display='block';
    dosingPanel.style.display='block';
    if(runBtn) runBtn.style.display='block';
    calibrationPanel.style.display='none';
    buildControls();
    run();
  }
}

function buildControls(){
  const p=presets[currentMode];
  const c=document.getElementById('controls');
  let html='';

  if(currentMode==='ddi'){
    html+=slider('CL (L/h)','cl',5,50,p.CL,1);
    html+=slider('Vd (L)','vd',50,500,p.Vd,10);
    html+=slider('ka (/h)','ka',0.5,5,p.ka,0.1);
    html+=slider('F','f',0.01,1,p.F,0.01);
    html+=slider('E2 Dose (mg)','dose',0.5,10,2,0.5);
    html+=slider('CPA Dose (mg)','cpDose',10,100,p.cpDose,5);
    html+=slider('Ki (mg/L)','ki',0.05,2.0,p.Ki,0.01);
  } else if(p.ev){
    html+=slider('ka_depot (/h)','ka',0.001,0.05,p.ka,0.001);
    html+=slider('Vd_E2 (L)','vd',100,800,p.Vd,10);
    html+=slider('ke_E2 (/h)','cl',0.02,0.15,p.CL/p.Vd,0.005);
    html+=slider('f_conv','fconv',0.01,0.5,p.fConv,0.01);
  } else {
    html+=slider('CL (L/h)','cl',5,50,p.CL,1);
    html+=slider('Vd (L)','vd',50,500,p.Vd,10);
    html+=slider('ka (/h)','ka',0.5,5,p.ka,0.1);
    html+=slider('F','f',0.01,1,p.F,0.01);
  }
  c.innerHTML=html;

  // Bind sliders
  c.querySelectorAll('input[type=range]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      document.getElementById(inp.id+'Val').textContent=fmtVal(inp);
      run();
    });
  });
}

function slider(label,id,min,max,val,step){
  return `<div class="control-group">
    <div class="control-label">${label}</div>
    <input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}">
    <div class="value-badge" id="${id}Val">${val}</div>
  </div>`;
}
function fmtVal(inp){
  const v=parseFloat(inp.value);
  return v<1?v.toFixed(3):v<10?v.toFixed(2):v.toFixed(1);
}

// --- PK Simulation ---
function simOral(CL,Vd,ka,F,dose,tEnd,step,freq){
  const ke=CL/Vd;
  const steps=Math.ceil(tEnd/step);
  let gut=0,conc=0;
  const t=[],c=[];
  let nextDose=0,doseIdx=0;

  for(let i=0;i<=steps;i++){
    const time=i*step;
    // Dose
    if(time>=nextDose-0.001){
      gut+=dose;
      doseIdx++;
      nextDose=doseIdx*freq;
    }
    // Derivatives
    const dGut=-ka*gut;
    const dConc=(F*ka*gut/Vd)-ke*conc;
    gut+=dGut*step;
    conc+=dConc*step;
    if(gut<0)gut=0;
    if(conc<0)conc=0;
    t.push(time);
    c.push(conc);
  }
  return{t,c};
}

function simEV(kaDepot,VdE2,keE2,fConv,dose,tEnd,step,freq){
  const MW=0.8665;
  const kh=10,keEV=0.5,VdEV=80;
  const steps=Math.ceil(tEnd/step);
  let depot=0,concE2=0;
  const t=[],c=[],dep=[];
  let nextDose=0,doseIdx=0;

  for(let i=0;i<=steps;i++){
    const time=i*step;
    if(time>=nextDose-0.001){
      depot+=dose;
      doseIdx++;
      nextDose=doseIdx*freq;
    }
    // QSS for EV
    const releaseRate=kaDepot*depot;
    const CevQSS=(fConv*releaseRate/VdEV)/(kh+keEV);
    const e2prod=kh*CevQSS*(VdEV/VdE2)*MW;
    const dDepot=-kaDepot*depot;
    const dE2=e2prod-keE2*concE2;
    depot+=dDepot*step;
    concE2+=dE2*step;
    if(depot<0)depot=0;
    if(concE2<0)concE2=0;
    t.push(time);
    c.push(concE2);
    dep.push(depot);
  }
  return{t,c,dep};
}

function simDDI(clE2,vdE2,kaE2,fE2,doseE2,cpCL,cpVd,cpka,cpF,cpDose,Ki,days,freq,step){
  const tEnd=days*24;
  const steps=Math.ceil(tEnd/step);
  const keE2=clE2/vdE2;
  const keCP=cpCL/cpVd;

  let gutE2=0,cE2=0,gutCP=0,cCP=0;
  const t=[],cSub=[],cInh=[];
  let nextDoseE2=0,nextDoseCP=0,doseIdx=0;

  for(let i=0;i<=steps;i++){
    const time=i*step;
    if(time>=nextDoseE2-0.001){
      gutE2+=doseE2;nextDoseE2=(doseIdx+1)*freq;
    }
    if(time>=nextDoseCP-0.001){
      gutCP+=cpDose;nextDoseCP=(doseIdx+1)*freq;
    }
    if(Math.abs(time-nextDoseE2)<step/2||Math.abs(time-nextDoseCP)<step/2) doseIdx++;

    // CPA PK
    const dGutCP=-cpka*gutCP;
    const dConcCP=(cpF*cpka*gutCP/cpVd)-keCP*cCP;

    // Inhibition
    const inhFrac=cCP/(cCP+Ki);
    const clEff=clE2*(1-inhFrac);

    // E2 PK with inhibited CL
    const dGutE2=-kaE2*gutE2;
    const dConcE2=(fE2*kaE2*gutE2/vdE2)-(clEff/vdE2)*cE2;

    gutE2+=dGutE2*step;
    cE2+=dConcE2*step;
    gutCP+=dGutCP*step;
    cCP+=dConcCP*step;

    if(gutE2<0)gutE2=0;if(cE2<0)cE2=0;
    if(gutCP<0)gutCP=0;if(cCP<0)cCP=0;

    t.push(time);
    cSub.push(cE2);
    cInh.push(cCP);
  }
  return{t,cSub,cInh};
}

// --- Chart ---
function drawChart(datasets,xLabel,yLabel){
  const canvas=document.getElementById('chart');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  canvas.width=canvas.clientWidth*dpr;
  canvas.height=canvas.clientHeight*dpr;
  ctx.scale(dpr,dpr);
  const W=canvas.clientWidth,H=canvas.clientHeight;

  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
  ctx.fillRect(0,0,W,H);

  const pad={t:20,r:20,b:40,l:60};
  const gw=W-pad.l-pad.r,gh=H-pad.t-pad.b;

  // Find ranges
  let xMax=0,yMax=0;
  for(const ds of datasets){
    const lastX=ds.t[ds.t.length-1];
    if(lastX>xMax)xMax=lastX;
    for(const v of ds.c) if(v>yMax)yMax=v;
  }
  if(yMax===0)yMax=1;
  yMax*=1.1;

  const toX=v=>pad.l+(v/xMax)*gw;
  const toY=v=>pad.t+gh-(v/yMax)*gh;

  // Grid
  ctx.strokeStyle='#1e293b';ctx.lineWidth=0.5;
  for(let i=0;i<=5;i++){
    const y=pad.t+gh*(i/5);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='10px Space Mono';
    ctx.textAlign='right';
    ctx.fillText((yMax*(1-i/5)).toFixed(yMax<0.1?4:yMax<1?3:1),pad.l-8,y+4);
  }
  for(let i=0;i<=6;i++){
    const x=pad.l+gw*(i/6);
    ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+gh);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='10px Space Mono';
    ctx.textAlign='center';
    ctx.fillText((xMax*i/6).toFixed(0)+'h',x,H-pad.b+16);
  }

  // Axes labels
  ctx.fillStyle='#64748b';ctx.font='10px Inter';ctx.textAlign='center';
  ctx.fillText(xLabel,pad.l+gw/2,H-4);
  ctx.save();ctx.translate(14,pad.t+gh/2);ctx.rotate(-Math.PI/2);
  ctx.fillText(yLabel,0,0);ctx.restore();

  // ---- Monotone Hermite spline (PCHIP) ----
  function drawSpline(ctx,ds,toX,toY){
    const t=ds.t,c=ds.c,n=t.length;
    if(n<2)return;
    const dt=new Float64Array(n-1),dc=new Float64Array(n-1),m=new Float64Array(n-1);
    for(let i=0;i<n-1;i++){dt[i]=t[i+1]-t[i];dc[i]=c[i+1]-c[i];m[i]=dc[i]/dt[i];}
    const d=new Float64Array(n);
    d[0]=m[0];d[n-1]=m[n-2];
    for(let i=1;i<n-1;i++)d[i]=(m[i-1]+m[i])/2;
    for(let i=0;i<n-1;i++){
      if(m[i]===0){d[i]=0;d[i+1]=0;}
      else{
        const a=d[i]/m[i],b=d[i+1]/m[i];
        if(a<0)d[i]=0;
        if(b<0)d[i+1]=0;
        const s=a*a+b*b;
        if(s>9){const tau=3/Math.sqrt(s);d[i]=tau*a*m[i];d[i+1]=tau*b*m[i];}
      }
    }
    ctx.beginPath();ctx.moveTo(toX(t[0]),toY(c[0]));
    for(let i=0;i<n-1;i++){
      const x0=toX(t[i]),x1=toX(t[i+1]),y0=toY(c[i]),y1=toY(c[i+1]);
      const dx=(x1-x0)/3;
      ctx.bezierCurveTo(x0+dx,y0+toY(0)-toY(d[i]*dt[i]/3),x1-dx,y1+toY(0)-toY(d[i+1]*dt[i]/3),x1,y1);
    }
    ctx.stroke();
  }

  // ---- Draw ----
  let smooth=window._smooth!==undefined?window._smooth:true;
  function draw(){
    const ctx=canvas.getContext('2d');
    const legendEl=document.getElementById('legend');
    const dpr=window.devicePixelRatio||1;
    canvas.width=canvas.clientWidth*dpr;canvas.height=canvas.clientHeight*dpr;
    ctx.scale(dpr,dpr);
    const W=canvas.clientWidth,H=canvas.clientHeight;
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
    ctx.fillRect(0,0,W,H);
    const pad={t:20,r:20,b:40,l:60};
    const gw=W-pad.l-pad.r,gh=H-pad.t-pad.b;
    let xMax=0,yMax=0;
    for(const ds of datasets){const lx=ds.t[ds.t.length-1];if(lx>xMax)xMax=lx;for(const v of ds.c)if(v>yMax)yMax=v;}
    if(yMax===0)yMax=1;yMax*=1.1;
    const toX=v=>pad.l+(v/xMax)*gw;
    const toY=v=>pad.t+gh-(v/yMax)*gh;
    ctx.strokeStyle='#1e293b';ctx.lineWidth=0.5;
    for(let i=0;i<=5;i++){const y=pad.t+gh*(i/5);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#475569';ctx.font='10px Space Mono';ctx.textAlign='right';ctx.fillText((yMax*(1-i/5)).toFixed(yMax<0.1?4:yMax<1?3:1),pad.l-8,y+4);}
    for(let i=0;i<=6;i++){const x=pad.l+gw*(i/6);ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+gh);ctx.stroke();ctx.fillStyle='#475569';ctx.font='10px Space Mono';ctx.textAlign='center';ctx.fillText((xMax*i/6).toFixed(0)+'h',x,H-pad.b+16);}
    ctx.fillStyle='#64748b';ctx.font='10px Inter';ctx.textAlign='center';ctx.fillText(xLabel,pad.l+gw/2,H-4);
    ctx.save();ctx.translate(14,pad.t+gh/2);ctx.rotate(-Math.PI/2);ctx.fillText(yLabel,0,0);ctx.restore();
    const colors=['#22d3ee','#f97316','#818cf8','#34d399'];
    for(let d=0;d<datasets.length;d++){
      const ds=datasets[d];ctx.strokeStyle=colors[d%colors.length];ctx.lineWidth=2;
      if(smooth)drawSpline(ctx,ds,toX,toY);
      else{ctx.beginPath();for(let i=0;i<ds.t.length;i++){const x=toX(ds.t[i]),y=toY(ds.c[i]);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();}
      if(ds.doses){ctx.globalAlpha=0.15;ctx.strokeStyle=colors[d%colors.length];ctx.lineWidth=1;for(const tt of ds.doses){const x=toX(tt);ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+gh);ctx.stroke();}ctx.globalAlpha=1;}
    }
    legendEl.innerHTML=datasets.map((ds,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${colors[i%colors.length]}"></div>${ds.label}</div>`).join('');
  }
  window._smooth=smooth;
  window._redraw=draw;
  draw();
}

// --- Stats ---
function calcStats(t,c,pgPerLiter){
  let cmax=0,tmax=0;
  for(let i=0;i<c.length;i++){
    if(c[i]>cmax){cmax=c[i];tmax=t[i];}
  }
  let auc=0;
  for(let i=1;i<t.length;i++){
    auc+=(c[i]+c[i-1])/2*(t[i]-t[i-1]);
  }
  // Find first peak for t½ estimation
  let peakIdx=0;
  for(let i=0;i<c.length;i++) if(c[i]>=cmax*0.99){peakIdx=i;break;}
  // t½: time from peak to half-peak
  let halfLife='—';
  const halfC=cmax/2;
  for(let i=peakIdx;i<c.length;i++){
    if(c[i]<=halfC){
      halfLife=((t[i]-tmax)/24).toFixed(1)+'d';
      break;
    }
  }

  const unit=pgPerLiter?' pg/mL':' mg/L';
  const scale=pgPerLiter?1e6:1;
  document.getElementById('statCmax').textContent=(cmax*scale).toFixed(1)+unit;
  document.getElementById('statTmax').textContent=tmax<24?tmax.toFixed(1)+'h':(tmax/24).toFixed(1)+'d';
  document.getElementById('statAUC').textContent=(auc*scale).toFixed(1)+(pgPerLiter?' pg·h/mL':' mg·h/L');
  document.getElementById('statHalf').textContent=halfLife;
}

// --- Toggle smooth ---
function toggleSmooth(){
  window._smooth=!window._smooth;
  document.getElementById('smoothBtn').textContent=window._smooth?'SMOOTH':'RAW';
  if(window._redraw)window._redraw();
}

// --- Run ---
function run(){
  const dose=parseFloat(document.getElementById('dose').value);
  const days=parseInt(document.getElementById('days').value);
  const freq=parseInt(document.getElementById('freq').value);
  const tEnd=days*24;
  const step=0.1; // hours

  if(currentMode==='oral'){
    const CL=parseFloat(document.getElementById('cl').value);
    const Vd=parseFloat(document.getElementById('vd').value);
    const ka=parseFloat(document.getElementById('ka').value);
    const F=parseFloat(document.getElementById('f').value);
    const result=simOral(CL,Vd,ka,F,dose,tEnd,step,freq);
    const doses=[];for(let d=0;d<days;d++)doses.push(d*freq);
    drawChart([{t:result.t,c:result.c,label:'E2 (oral)',doses:doses}],'Time','Concentration (mg/L)');
    calcStats(result.t,result.c,true);
  }
  else if(currentMode==='im'){
    const ka=parseFloat(document.getElementById('ka').value);
    const Vd=parseFloat(document.getElementById('vd').value);
    const ke=parseFloat(document.getElementById('cl').value)/Vd;
    const fConv=parseFloat(document.getElementById('fconv').value);
    const result=simEV(ka,Vd,ke,fConv,dose,tEnd,step,freq);
    const doses=[];for(let d=0;d<days;d++)doses.push(d*freq);
    // Normalize depot to same scale as E2 for visual comparison
    const maxE2=Math.max(...result.c)||1;
    const maxDep=Math.max(...result.dep)||1;
    const depNorm=result.dep.map(v=>v/maxDep*maxE2);
    drawChart([
      {t:result.t,c:result.c,label:'E₂ (mg/L)',doses:doses},
      {t:result.t,c:depNorm,label:'EV depot (scaled)',doses:doses}
    ],'Time','Concentration');
    calcStats(result.t,result.c,true);
  }
  else if(currentMode==='ddi'){
    const CL=parseFloat(document.getElementById('cl').value);
    const Vd=parseFloat(document.getElementById('vd').value);
    const ka=parseFloat(document.getElementById('ka').value);
    const F=parseFloat(document.getElementById('f').value);
    const cpDose=parseFloat(document.getElementById('cpDose').value);
    const Ki=parseFloat(document.getElementById('ki').value);

    // With DDI
    const withDDI=simDDI(CL,Vd,ka,F,dose,2.73,340,2.0,0.88,cpDose,Ki,days,freq,step);
    // Without DDI (CPA dose=0)
    const noDDI=simDDI(CL,Vd,ka,F,dose,2.73,340,2.0,0.88,0,Ki,days,freq,step);

    const doses=[];for(let d=0;d<days;d++)doses.push(d*freq);
    drawChart([
      {t:withDDI.t,c:withDDI.cSub,label:'E2 + CPA',doses:doses},
      {t:noDDI.t,c:noDDI.cSub,label:'E2 alone',doses:doses}
    ],'Time','Concentration (mg/L)');

    // Stats for DDI case
    calcStats(withDDI.t,withDDI.cSub,true);

    // Show AUC ratio
    let aucDDI=0,aucCtrl=0;
    for(let i=1;i<withDDI.t.length;i++){
      aucDDI+=(withDDI.cSub[i]+withDDI.cSub[i-1])/2*(withDDI.t[i]-withDDI.t[i-1]);
      aucCtrl+=(noDDI.cSub[i]+noDDI.cSub[i-1])/2*(noDDI.t[i]-noDDI.t[i-1]);
    }
    const ratio=(aucDDI/aucCtrl).toFixed(2);
    document.getElementById('statAUC').textContent=`${ratio}x ratio`;
  }
}

    {metric:'Cmax',value:0.15,weight:1.0},

  ],

function addTarget(){
  calibrationState.targets.push({metric:'Cmax',value:0.1,weight:1.0});
  buildCalibrationControls();
}

function addParam(){
  calibrationState.paramNames.push('ka');
  calibrationState.paramRanges.push({min:0.5,max:3.0});
  buildCalibrationControls();
}

function getCalibrationInputs(){
  const targets=[];
  for(let i=0;i<calibrationState.targets.length;i++){
    const def=calibrationState.targets[i];
    const metric=document.getElementById(`targetMetric${i}`)?.value||def.metric;
    const value=parseFloat(document.getElementById(`targetValue${i}`)?.value||def.value);
    const weight=parseFloat(document.getElementById(`targetWeight${i}`)?.value||def.weight);
    targets.push({metric,value,weight});
  }
  const paramNames=[];
  const paramRanges=[];
  for(let i=0;i<calibrationState.paramNames.length;i++){
    const def={name:calibrationState.paramNames[i],...calibrationState.paramRanges[i]};
    const name=document.getElementById(`paramName${i}`)?.value||def.name;
    const min=parseFloat(document.getElementById(`paramMin${i}`)?.value||def.min);
    const max=parseFloat(document.getElementById(`paramMax${i}`)?.value||def.max);
    paramNames.push(name);
    paramRanges.push({min,max});
  }
  const resolution=parseInt(document.getElementById('calResolution')?.value||calibrationState.resolution);
  const dose=parseFloat(document.getElementById('calDose')?.value||'2');
  const days=parseInt(document.getElementById('calDays')?.value||'14');
  return{targets,paramNames,paramRanges,resolution,dose,days};
}

function simFactory(params,dose,days){
  // Oral simulation with given params
  const CL=params.CL||25;
  const Vd=params.Vd||200;
  const ka=params.ka||1.5;
  const F=params.F||0.05;
  const tEnd=days*24;
  const step=0.5;
  const freq=24;
  const result=simOral(CL,Vd,ka,F,dose,tEnd,step,freq);

  // Calculate metrics
  let cmax=0,tmax=0;
  for(let i=0;i<result.c.length;i++){
    if(result.c[i]>cmax){cmax=result.c[i];tmax=result.t[i];}
  }
  let auc=0;
  for(let i=1;i<result.t.length;i++){
    auc+=(result.c[i]+result.c[i-1])/2*(result.t[i]-result.t[i-1]);
  }

  return{Cmax:cmax,AUC:auc,Tmax:tmax};
}

function runCalibration(){
  const inputs=getCalibrationInputs();
  const{targets,paramNames,paramRanges,resolution,dose,days}=inputs;

  // Build grids
  const grids=paramRanges.map(r=>{
    const step=(r.max-r.min)/(resolution-1);
    const points=[];
    for(let i=0;i<resolution;i++) points.push(r.min+step*i);
    return points;
  });

  let minError=Infinity;
  let optimalParams={};
  const allErrors=[];
  const errorHistory=[];

  // Grid search (supports 1, 2, or N params)
  if(paramNames.length===1){
    for(const p0 of grids[0]){
      const params={[paramNames[0]]:p0};
      const metrics=simFactory(params,dose,days);
      const error=computeCalError(targets,metrics);
      allErrors.push(error);
      errorHistory.push({paramValue:p0,error});
      if(error<minError){minError=error;optimalParams={...params};}
    }
  } else if(paramNames.length===2){
    for(const p0 of grids[0]){
      for(const p1 of grids[1]){
        const params={[paramNames[0]]:p0,[paramNames[1]]:p1};
        const metrics=simFactory(params,dose,days);
        const error=computeCalError(targets,metrics);
        allErrors.push(error);
        errorHistory.push({paramValue:(p0+p1)/2,error});
        if(error<minError){minError=error;optimalParams={...params};}
      }
    }
  } else {
    const combos=cartesianProduct(grids);
    for(const combo of combos){
      const params={};
      paramNames.forEach((name,idx)=>params[name]=combo[idx]);
      const metrics=simFactory(params,dose,days);
      const error=computeCalError(targets,metrics);
      allErrors.push(error);
      errorHistory.push({paramValue:combo[0],error});
      if(error<minError){minError=error;optimalParams={...params};}
    }
  }

  calibrationState.results={optimalParams,minError,allErrors};
  calibrationState.errorHistory=errorHistory;
  calibrationState.inputs=inputs;

  displayCalibrationResults(optimalParams,minError,targets,inputs);
}

function computeCalError(targets,metrics){
  let total=0;
  for(const t of targets){
    const sim=metrics[t.metric];
    if(sim===undefined) continue;
    if(t.value===0) continue;
    const relErr=Math.abs(sim-t.value)/Math.abs(t.value);
    total+=t.weight*relErr;
  }
  return total;
}

function cartesianProduct(arrays){
  if(arrays.length===0) return[[]];
  const result=[];
  const helper=(current,depth)=>{
    if(depth===arrays.length){result.push([...current]);return;}
    for(const val of arrays[depth]){
      current.push(val);
      helper(current,depth+1);
      current.pop();
    }
  };
  helper([],0);
  return result;
}

function displayCalibrationResults(optimalParams,minError,targets,inputs){
  const el=document.getElementById('calibrationResults');
  let html='<div class="panel" style="margin-top:0">';
  html+='<div class="panel-title">Results</div>';

  // Optimal params table
  html+='<table style="width:100%;border-collapse:collapse;font-size:0.8rem;margin-bottom:12px">';
  html+='<tr style="color:var(--text-dim);font-size:0.7rem;text-align:left"><th>Parameter</th><th>Optimal Value</th></tr>';
  for(const[name,val]of Object.entries(optimalParams)){
    html+=`<tr style="border-top:1px solid var(--border)"><td>${name}</td><td style="color:var(--aurora1);font-family:'Space Mono',monospace">${val.toFixed(4)}</td></tr>`;
  }
  html+='</table>';

  // Min error
  html+=`<div style="margin-bottom:12px;font-size:0.8rem">Minimum weighted error: <span style="color:var(--aurora2);font-family:'Space Mono',monospace">${minError.toExponential(4)}</span></div>`;

  // Fit quality
  const simMetrics=simFactory(optimalParams,inputs.dose,inputs.days);
  html+='<div style="font-size:0.7rem;color:var(--text-dim);margin-bottom:4px">FIT QUALITY</div>';
  html+='<table style="width:100%;border-collapse:collapse;font-size:0.8rem;margin-bottom:12px">';
  html+='<tr style="color:var(--text-dim);font-size:0.7rem;text-align:left"><th>Metric</th><th>Target</th><th>Predicted</th><th>Rel.Error%</th></tr>';
  for(const t of targets){
    const predicted=simMetrics[t.metric]||0;
    const relErr=t.value!==0?(Math.abs(predicted-t.value)/t.value*100).toFixed(2):'N/A';
    html+=`<tr style="border-top:1px solid var(--border)"><td>${t.metric}</td><td>${t.value}</td><td style="color:var(--aurora1)">${predicted.toFixed(4)}</td><td>${relErr}</td></tr>`;
  }
  html+='</table>';

  // Error distribution chart (mini)
  html+='<div style="font-size:0.7rem;color:var(--text-dim);margin-bottom:4px">ERROR DISTRIBUTION</div>';
  html+='<canvas id="errorChart" style="width:100%;height:120px;background:var(--bg);border:1px solid var(--border);border-radius:4px"></canvas>';

  html+='</div>';
  el.innerHTML=html;

  // Draw error distribution
  setTimeout(()=>drawErrorChart(calibrationState.results.allErrors),50);
}

function drawErrorChart(errors){
  const canvas=document.getElementById('errorChart');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  canvas.width=canvas.clientWidth*dpr;
  canvas.height=canvas.clientHeight*dpr;
  ctx.scale(dpr,dpr);
  const W=canvas.clientWidth,H=canvas.clientHeight;

  ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
  ctx.fillRect(0,0,W,H);

  // Simple histogram
  const bins=20;
  const maxErr=Math.max(...errors,0.001);
  const counts=new Array(bins).fill(0);
  for(const e of errors){
    const idx=Math.min(Math.floor(e/maxErr*bins),bins-1);
    counts[idx]++;
  }
  const maxCount=Math.max(...counts,1);

  const barW=(W-20)/bins;
  for(let i=0;i<bins;i++){
    const barH=(counts[i]/maxCount)*(H-30);
    const x=10+i*barW;
    const y=H-20-barH;
    ctx.fillStyle='rgba(34,211,238,0.6)';
    ctx.fillRect(x+1,y,barW-2,barH);
  }

  // X axis label
  ctx.fillStyle='#475569';
  ctx.font='10px Space Mono';
  ctx.textAlign='center';
  ctx.fillText('0',10,H-5);
  ctx.fillText(maxErr.toExponential(2),W-10,H-5);
}

function generateReport(){
  if(!calibrationState.results){
    alert('Please run calibration first');
    return;

  const{optimalParams,minError}=calibrationState.results;
  const inputs=calibrationState.inputs;

  // Fit quality scoring
  let totalRelErr=0,validCount=0;
  const fitRows=[];
  for(const t of inputs.targets){
    const pred=simMetrics[t.metric]||0;
    let relErrPct='N/A',status='bad';
    if(t.value!==0){
      const re=Math.abs(pred-t.value)/Math.abs(t.value);
      totalRelErr+=re;validCount++;
      relErrPct=(re*100).toFixed(2);
      status=re<0.05?'good':re<0.15?'warn':'bad';
    }
    fitRows.push({metric:t.metric,target:t.value,pred:pred.toFixed(4),relErrPct,status});
  }
  const avgErr=validCount>0?totalRelErr/validCount:1;
  const score=Math.max(0,Math.min(100,(1-avgErr)*100));
  const grade=avgErr<0.05?'A':avgErr<0.15?'B':avgErr<0.30?'C':'D';
  const gradeColor={A:'#34d399',B:'#22d3ee',C:'#eab308',D:'#ef4444'}[grade];

  // Param table rows
  const paramRows=inputs.paramNames.map(name=>{
    const range=inputs.paramRanges.find((_,i)=>inputs.paramNames[i]===name);
    const initVal=range?(range.min+range.max)/2:0;
    const opt=optimalParams[name]||0;
    const dev=initVal!==0?(((opt-initVal)/initVal)*100).toFixed(2):'N/B';
    return{name,init:initVal.toFixed(2),opt:opt.toFixed(4),dev};
  });

  // Error history for chart
  const errLabels=calibrationState.errorHistory.map((_,i)=>i+1);
  const errData=calibrationState.errorHistory.map(s=>isFinite(s.error)?s.error:0);

  // Build HTML
  const hexClip='polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)';
  const html=`<!DOCTYPE html>

<script>
(function(){
  const data=${JSON.stringify(errData)};
  const canvas=document.getElementById('errChart');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const pad={t:20,r:20,b:40,l:60};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const maxErr=Math.max(...data.filter(v=>isFinite(v)),0.001);
  ctx.fillStyle='#0a0e17';ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(34,211,238,0.08)';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){const y=pad.t+ch*i/5;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();}
  // Line
  if(data.length>1){
    ctx.beginPath();ctx.strokeStyle='#22d3ee';ctx.lineWidth=2;
    for(let i=0;i<data.length;i++){
      const x=pad.l+cw*i/(data.length-1);
      const y=pad.t+ch*(1-data[i]/maxErr);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
    // Fill
    ctx.lineTo(pad.l+cw,pad.t+ch);ctx.lineTo(pad.l,pad.t+ch);ctx.closePath();
    ctx.fillStyle='rgba(34,211,238,0.08)';ctx.fill();
    // Dots
    for(let i=0;i<data.length;i++){
      const x=pad.l+cw*i/(data.length-1);
      const y=pad.t+ch*(1-data[i]/maxErr);
      ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle='#f97316';ctx.fill();
    }
  }
  // Axes labels
  ctx.fillStyle='#475569';ctx.font='11px Space Mono';ctx.textAlign='center';
  ctx.fillText('Iteration 1',pad.l,H-8);
  ctx.fillText('Iteration '+data.length,W-pad.r,H-8);
  ctx.textAlign='right';ctx.fillText(maxErr.toExponential(1),pad.l-8,pad.t+12);
  ctx.fillText('0',pad.l-8,pad.t+ch);
})();
